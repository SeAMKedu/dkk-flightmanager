drone_sub_enum     = 0
payload_enum       = 50
payload_sub_enum   = 0
payload_position_index = 0
focal_length_mm    = 24.0
pixel_pitch_um     = 4.4
image_width_px     = 8192
image_height_px    = 5460
image_format       = "wide"
battery_minutes    = 35.0
# 45 MP sensor. Estimate — calibrate from DJI Pilot 2 auto-speed at a known altitude.
min_capture_interval_s = 2.0

