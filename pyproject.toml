[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dkk-jobgen"
version = "1.1.0"
description = "DJI terrain-following mapping job generator for Finnish field parcels"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31",
    "shapely>=2.0",
    "pyproj>=3.6",
    "rasterio>=1.3",
    "lxml>=5.0",
    "typer>=0.12",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "responses>=0.25",
]

[project.scripts]
jobgen = "jobgen.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "integration: hits live network services — run with -m integration",
]
