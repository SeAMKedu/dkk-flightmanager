# mavic3e-jobgen configuration — copy to config.toml and adjust.
# config.toml is gitignored. This example file is committed.
# API keys go in environment variables (see .env.example), NOT here.

[flight]
# Target GSD is authoritative; flight height is derived from it.
# GSD formula: height = gsd_cm * focal_length_mm / (pixel_pitch_um / 10)
# M3E camera constants (confirm against spec): focal_length_mm=12.3, pixel_pitch_um=3.3, image 5280x3956
target_gsd_cm = 3.0           # cm/px — derived height ≈ 111 m; tune to stay under ceiling
max_height_agl_m = 110        # hard ceiling (legal limit 120 m; keep margin)
agl_safety_margin_m = 10      # added to DSM min when checking obstacle clearance
takeoff_security_height_m = 50
transitional_speed_ms = 15    # m/s transit between waylines
overlap_front_pct = 80
overlap_side_pct = 70
# Speed along mapping strips (m/s). Default matches the reference fixture (8.9 m/s).
auto_flight_speed_ms = 8.9
# Extra margin around the survey polygon in the terrain-follow DSM (metres).
# Covers the RTH path and takeoff/landing area outside the survey polygon.
dsm_margin_m = 300
finish_action = "goHome"      # goHome | hover | autoLand
rc_lost_action = "goBack"

[home_safety]
# EU Open-category subcategory. Determines default home_buffer_m.
# A3 (no C-label / C3 / C4): 150 m from residential/commercial/industrial/recreational areas.
# A2 (C2 label + A2 certificate): height-based distance from people; built-up areas not subject to 150 m.
# Confirm against the drone's actual C-label marking and current Traficom guidance.
operating_subcategory = "A3"  # conservative default
home_buffer_m = 150
# MML Maastotietokanta kohdeluokka codes for residential buildings (keep-out for A2 + A3).
# Confirmed: 42210=asuinrakennus (point repr.), 42211 (1-2 floors), 42212 (3+ floors).
residential_kohdeluokka = [42210, 42211, 42212]
# For A3: also keep 150 m from commercial, holiday, and industrial buildings.
# 42220-42222=liike-/julkinen, 42230-42232=lomarakennus, 42240-42242=teollinen.
# Agricultural/storage (42260-42262) excluded — they are part of the farm operation.
a3_additional_kohdeluokka = [42220, 42221, 42222, 42230, 42231, 42232, 42240, 42241, 42242]
offset_enabled = true         # subtract keep-out from survey polygon
max_area_loss_pct = 30        # flag needs_review if more than this % lost to keep-out

[polygon]
edge_buffer_m = 0             # optional outward edge buffer on merged parcel polygon
# Close small gaps between adjacent parcels (morphological closing: buffer +d then -d).
# Bridges gaps up to 2×gap_fill_m wide; rounds corners by up to gap_fill_m.
# Typical Finnish field cadastral gaps are 0–5 m.  0 = disabled.
gap_fill_m = 3.0
simplify_tolerance_m = 1.0    # applied after difference; 0 = disabled
# What to do if difference() produces a MultiPolygon:
#   split   → emit one KMZ per piece
#   largest → keep only the largest piece
#   review  → flag needs_review, skip artifact write
multipart_policy = "review"
# What to do if the result polygon has interior holes:
#   review → flag needs_review, skip artifact write
#   fill   → fill holes (use convex hull of ring)
#   clip   → drop holed polygons, keep only exterior ring
hole_policy = "fill"

[cache]
cache_dir = "cache"
tile_size_m = 1000            # grid tile side length in EPSG:3067 metres
dem_ttl_days = 365            # korkeusmalli_2m: near-static, long TTL
buildings_ttl_days = 180      # maastotietokanta: slower-changing, shorter TTL
offline = false               # true = cache-only; fail cleanly on cache miss

[output]
output_dir = "output"

[zones]
# Traficom publishes Finnish UAS zones at a confirmed open endpoint (no auth).
# The tool fetches and caches this automatically — no manual download needed.
# api_url is the default; override only if Traficom changes the URL.
# api_url = "https://eservices.traficom.fi/Ilmatilasovellus/api/uas-reservations/json?lang=fi"
#
# Optional: point to a local file instead of the API (offline / custom zones).
# zones_file = "data/uas_zones_override.geojson"
#
# Re-fetch if the local copy is older than this many days.
# The source is a periodic static dump of permanent zones — 7–30 days is fine.
# Temporary restrictions (NOTAMs) are not in this dataset; check those manually.
max_age_days = 14

[parcels]
# Year of the Ruokavirasto LPIS layer to query (inspire:LC.LandCoverSurfaces.LPIS.<year>).
# Defaults to current_year - 1 (the most recently completed and published season).
# Override here if you need a specific year.
# lpis_year = 2025
page_size = 1000    # WFS page size; GeoServer cap is 1000
timeout_s = 60
